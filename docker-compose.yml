services:
  redis:
    image: redis/redis-stack-server:latest
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: finagentics:latest
    env_file:
      - ./.env
    environment:
      # Default to local Redis Stack, but allow cloud Redis via REDIS_URL.
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/src:/app/src
    depends_on:
      - redis
